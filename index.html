  <style>
    /* ─── RESET ─── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; }

    /* ─── BODY ─── */
    body {
      background: #050507;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow-x: hidden;
    }

    /* Red top glow */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 50vh;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(160,15,15,0.22) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── PARTICLES ─── */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(110vh); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { transform: translateY(-60px); opacity: 0; }
    }

    /* ─── CARD ─── */
    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 380px;
      background: #0e0f11;
      border: 1px solid rgba(180,30,30,0.30);
      border-radius: 20px;
      padding: 36px 24px 28px;
      text-align: center;
    }

    /* Animated red glow ring around card */
    .card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 20px;
      background: transparent;
      box-shadow:
        0 0 30px rgba(200,20,20,0.18),
        0 0 80px rgba(160,10,10,0.12);
      animation: pulse 3.5s ease-in-out infinite;
      pointer-events: none;
      z-index: -1;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 30px rgba(200,20,20,0.18), 0 0 80px rgba(160,10,10,0.12); }
      50%      { box-shadow: 0 0 50px rgba(200,20,20,0.32), 0 0 120px rgba(160,10,10,0.22); }
    }

    /* Red corner brackets */
    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 20px;
      background:
        linear-gradient(90deg, rgba(210,35,35,0.6) 0%, transparent 35%)   top    left  / 70px 1px no-repeat,
        linear-gradient(180deg,rgba(210,35,35,0.6) 0%, transparent 35%)   top    left  / 1px 70px no-repeat,
        linear-gradient(270deg,rgba(210,35,35,0.6) 0%, transparent 35%)   top    right / 70px 1px no-repeat,
        linear-gradient(180deg,rgba(210,35,35,0.6) 0%, transparent 35%)   top    right / 1px 70px no-repeat,
        linear-gradient(90deg,  transparent 65%, rgba(210,35,35,0.6) 100%) bottom left  / 70px 1px no-repeat,
        linear-gradient(0deg,   rgba(210,35,35,0.6) 0%, transparent 35%)  bottom left  / 1px 70px no-repeat,
        linear-gradient(270deg, transparent 65%, rgba(210,35,35,0.6) 100%) bottom right / 70px 1px no-repeat,
        linear-gradient(0deg,   rgba(210,35,35,0.6) 0%, transparent 35%)  bottom right / 1px 70px no-repeat;
      pointer-events: none;
    }

    /* ─── 1. AVATAR ─── */
    .avatar-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    /* Outer faint ring */
    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 1px solid rgba(210,35,35,0.16);
      animation: spin 8s linear infinite reverse;
    }

    /* Inner spinning ring */
    .avatar-wrap::after {
      content: '';
      position: absolute;
      inset: -7px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: rgba(220,40,40,0.85);
      border-right-color: rgba(220,40,40,0.30);
      animation: spin 2.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .avatar-img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
      border: 2px solid rgba(210,35,35,0.55);
      box-shadow:
        0 0 0 4px rgba(210,35,35,0.10),
        0 0 24px rgba(200,25,25,0.45),
        0 0 50px rgba(180,15,15,0.25);
      filter: saturate(1.1) contrast(1.06);
    }

    .live-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      background: #bf1515;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      box-shadow: 0 0 8px rgba(190,20,20,0.9);
      animation: blink 1.8s ease-in-out infinite;
      z-index: 5;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.5; }
    }

    /* ─── 2. TITLE ─── */
    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 0.13em;
      color: #ffffff;
      display: block;
      position: relative;
      padding: 14px 0 10px;
      text-shadow:
        0 0 8px  rgba(255,50,50,1),
        0 0 20px rgba(220,25,25,0.80),
        0 0 45px rgba(190,15,15,0.55),
        0 0 90px rgba(150,8,8,0.30);
    }

    /* Laser lines */
    .title::before,
    .title::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      height: 1px;
      width: 75%;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255,50,50,0.85) 25%,
        rgba(255,120,120,1) 50%,
        rgba(255,50,50,0.85) 75%,
        transparent 100%
      );
      box-shadow: 0 0 8px rgba(255,50,50,0.8), 0 0 16px rgba(220,20,20,0.5);
      animation: laser 2.8s ease-in-out infinite;
    }
    .title::before { top: 0; }
    .title::after  { bottom: 0; animation-delay: 0.6s; }

    @keyframes laser {
      0%,100% { width: 55%; opacity: 0.6; }
      50%      { width: 85%; opacity: 1; }
    }

    /* ─── 3. SUBTITLE ─── */
    .subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.26em;
      color: rgba(195,195,195,0.40);
      text-transform: uppercase;
      margin-top: 14px;
      margin-bottom: 26px;
      display: block;
    }

    /* ─── 4. PHASE BOXES ─── */
    .phases {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
    }

    .phase {
      flex: 1;
      min-width: 0;
      border-radius: 10px;
      padding: 10px 6px 9px;
      background: rgba(0,0,0,0.35);
    }

    .phase-label {
      display: block;
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(170,170,170,0.45);
      margin-bottom: 5px;
    }

    .phase-value {
      display: block;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .phase.bullish {
      border: 1px solid rgba(0,210,110,0.35);
    }
    .phase.bullish .phase-value {
      color: #00e07a;
      text-shadow: 0 0 10px rgba(0,210,100,0.70);
    }

    .phase.stable {
      border: 1px solid rgba(130,75,225,0.45);
    }
    .phase.stable .phase-value {
      color: #aa65ff;
      text-shadow: 0 0 10px rgba(140,75,240,0.70);
    }

    .phase.bearish {
      border: 1px solid rgba(215,38,38,0.45);
    }
    .phase.bearish .phase-value {
      color: #ff4040;
      text-shadow: 0 0 10px rgba(255,50,50,0.70);
    }

    /* ─── 5. BUTTON ─── */
    .cta-btn {
      display: block;
      width: 100%;
      padding: 15px 10px;
      background: linear-gradient(90deg, #c27608 0%, #eda01e 28%, #fbbf24 52%, #eda01e 74%, #c27608 100%);
      border: none;
      border-radius: 10px;
      color: #160b00;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      margin-bottom: 16px;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
      box-shadow:
        0 0 20px rgba(235,155,15,0.42),
        0 0 44px rgba(200,115,8,0.20),
        inset 0 1px 0 rgba(255,255,255,0.25);
      -webkit-tap-highlight-color: transparent;
    }

    .cta-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -110%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.30), transparent);
      animation: sweep 3.2s ease-in-out infinite;
    }
    @keyframes sweep {
      0%        { left: -110%; }
      40%, 100% { left: 150%; }
    }

    .cta-btn:hover, .cta-btn:focus {
      transform: translateY(-2px);
      box-shadow:
        0 0 30px rgba(235,155,15,0.65),
        0 0 65px rgba(200,115,8,0.35),
        inset 0 1px 0 rgba(255,255,255,0.25);
      outline: none;
    }
    .cta-btn:active { transform: translateY(0); }

    /* ─── 6. FOOTER ─── */
    .footer-text {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.10em;
      color: rgba(145,145,145,0.38);
      text-transform: uppercase;
    }
    .footer-text .count {
      color: #eda01e;
      font-weight: 700;
      text-shadow: 0 0 6px rgba(235,155,15,0.55);
    }

    /* ─────────────────────────
       RESPONSIVE BREAKPOINTS
    ───────────────────────── */

    /* Very small phones  ≤ 360px */
    @media (max-width: 360px) {
      .card           { padding: 28px 16px 24px; border-radius: 16px; }
      .avatar-img     { width: 110px; height: 110px; }
      .avatar-wrap::before { inset: -12px; }
      .avatar-wrap::after  { inset: -5px; }
      .title          { font-size: 22px; letter-spacing: 0.10em; }
      .subtitle       { font-size: 9px; letter-spacing: 0.18em; }
      .phase-value    { font-size: 12px; }
      .phase-label    { font-size: 7px; }
      .cta-btn        { font-size: 10px; padding: 13px 8px; letter-spacing: 0.10em; }
      .phases         { gap: 5px; }
    }

    /* Standard phones  361–480px  (default styles above cover this) */

    /* Large phones / small tablets  481–767px */
    @media (min-width: 481px) and (max-width: 767px) {
      .card       { max-width: 420px; padding: 38px 28px 30px; }
      .avatar-img { width: 150px; height: 150px; }
      .avatar-wrap::before { inset: -18px; }
      .avatar-wrap::after  { inset: -8px; }
      .title      { font-size: 32px; }
    }

    /* Tablets  768px+ */
    @media (min-width: 768px) {
      .card       { max-width: 440px; padding: 44px 36px 34px; }
      .avatar-img { width: 155px; height: 155px; }
      .avatar-wrap::before { inset: -18px; }
      .avatar-wrap::after  { inset: -8px; }
      .title      { font-size: 32px; }
      .subtitle   { font-size: 12px; }
      .phase-value{ font-size: 15px; }
      .phase-label{ font-size: 9px; }
      .cta-btn    { font-size: 13px; padding: 17px; }
      .footer-text{ font-size: 11px; }
    }

    /* Desktop  1024px+ */
    @media (min-width: 1024px) {
      .card       { max-width: 460px; }
      .avatar-img { width: 160px; height: 160px; }
      .title      { font-size: 34px; }
    }
  </style>
